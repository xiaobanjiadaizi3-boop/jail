<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Jail</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      font-family: -apple-system, "Helvetica Neue", sans-serif;
    }

    /* ── 選択画面 ── */
    #select-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 32px;
      gap: 0;
    }

    #select-screen h1 {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    #select-screen p {
      font-size: 13px;
      color: #aaaaaa;
      margin-bottom: 36px;
      letter-spacing: 0.05em;
    }

    .genre-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 40px;
    }

    .genre-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border: 1.5px solid #e8e8e8;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .genre-item.selected {
      border-color: #1a1a1a;
      background: #f9f9f9;
    }

    .genre-item .check {
      width: 20px; height: 20px;
      border: 1.5px solid #cccccc;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }

    .genre-item.selected .check {
      border-color: #1a1a1a;
      background: #1a1a1a;
    }

    .genre-item.selected .check::after {
      content: "";
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
    }

    .genre-label {
      font-size: 16px;
      color: #1a1a1a;
      letter-spacing: 0.05em;
    }

    #start-btn {
      width: 100%;
      max-width: 320px;
      padding: 16px;
      background: #1a1a1a;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      letter-spacing: 0.1em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #start-btn:disabled {
      background: #cccccc;
      cursor: default;
    }

    /* ── メイン画面 ── */
    #main-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px;
    }

    #genre-label {
      font-size: 12px;
      letter-spacing: 0.25em;
      color: #cccccc;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    #message {
      font-size: clamp(17px, 5vw, 24px);
      font-weight: 400;
      color: #1a1a1a;
      text-align: center;
      line-height: 2;
      letter-spacing: 0.06em;
    }

    #timer {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #e0e0e0;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <!-- 選択画面 -->
  <div id="select-screen">
    <h1>Jail</h1>
    <p>表示するジャンルを選んでください</p>
    <div class="genre-list" id="genre-list"></div>
    <button id="start-btn" disabled>開始する</button>
  </div>

  <!-- メイン画面 -->
  <div id="main-screen">
    <div id="genre-label"></div>
    <div id="message"></div>
  </div>
  <div id="timer"></div>

  <script>
    const INTERVAL_MS = 5 * 60 * 1000;

    const genres = [
      {
        id: "study", name: "勉強",
        messages: [
          "教科書を開こう。スマホより、未来の自分を選ぼう。",
          "今集中できれば、明日の自分が楽になる。",
          "1ページでいい。手を動かすことから始めよう。",
          "理解できないことはメモして先に進もう。",
          "今日の積み重ねが実力になる。",
          "静かに考える時間が本当の学びをつくる。",
        ]
      },
      {
        id: "health", name: "健康",
        messages: [
          "背筋を伸ばして、深く息を吸おう。",
          "目を閉じて20秒。目も休息が必要だ。",
          "水を一杯飲もう。体は正直に喜ぶ。",
          "少し立ち上がってその場で体を動かそう。",
          "肩をゆっくり回して力を抜こう。",
          "よく眠れているか。体の声を聞こう。",
        ]
      },
      {
        id: "mindfulness", name: "マインドフルネス",
        messages: [
          "今、ここにある。それで十分だ。",
          "呼吸だけに意識を向けてみよう。",
          "焦らなくていい。時間はちゃんとある。",
          "頭の中を空っぽにする時間。何もしなくていい。",
          "今この瞬間を感じること。それが全てだ。",
          "静寂は贈り物だ。",
        ]
      },
      {
        id: "nature", name: "自然",
        messages: [
          "窓の外を眺めよう。空は今日も動いている。",
          "少し換気しよう。外の空気を感じよう。",
          "植物に水をあげる時間かもしれない。",
          "太陽の光を浴びよう。体が喜ぶ。",
          "雨の音を聞いてみよう。自然のリズムがある。",
          "今日の空の色は何色だろう。",
        ]
      },
      {
        id: "relations", name: "人間関係",
        messages: [
          "大切な人のことを思い浮かべよう。",
          "今日誰かに感謝を伝えよう。",
          "画面越しじゃない時間をつくろう。",
          "一人でいることも豊かな時間だ。",
          "自分自身と向き合う時間にしよう。",
          "誰かの声を直接聞きたくなったら、電話しよう。",
        ]
      },
      {
        id: "creative", name: "創造",
        messages: [
          "何かを書いてみよう。思ったことをそのまま。",
          "紙とペンを出して落書きしよう。",
          "頭の中のアイデアをどこかに記録しよう。",
          "やってみたいことをリストにしよう。",
          "何かを作る喜びを思い出そう。",
          "想像することを楽しもう。",
        ]
      },
      {
        id: "detox", name: "デジタルデトックス",
        messages: [
          "スマホなしで何ができるか考えよう。",
          "通知は後でいい。今は自分の時間だ。",
          "画面のない時間が本当の休憩だ。",
          "SNSは逃げない。自分の時間を取り戻そう。",
          "情報から離れることも大切な選択だ。",
          "今日のスマホ断ちを続けよう。よくやっている。",
        ]
      },
    ];

    // ── 選択画面の構築 ──
    const selectedIds = new Set();
    const listEl = document.getElementById("genre-list");
    const startBtn = document.getElementById("start-btn");

    genres.forEach(g => {
      const item = document.createElement("div");
      item.className = "genre-item";
      item.innerHTML = `<div class="check"></div><span class="genre-label">${g.name}</span>`;
      item.addEventListener("click", () => {
        if (selectedIds.has(g.id)) {
          selectedIds.delete(g.id);
          item.classList.remove("selected");
        } else {
          selectedIds.add(g.id);
          item.classList.add("selected");
        }
        startBtn.disabled = selectedIds.size === 0;
      });
      listEl.appendChild(item);
    });

    startBtn.addEventListener("click", () => {
      document.getElementById("select-screen").style.display = "none";
      const mainEl = document.getElementById("main-screen");
      mainEl.style.display = "flex";
      update();
    });

    // ── メイン画面 ──
    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function formatMsg(text) {
      return text.replace(/([、。])/g, '$1<br>');
    }

    function update() {
      const pool = genres.filter(g => selectedIds.has(g.id));
      const genre = pick(pool);
      const message = pick(genre.messages);
      document.getElementById("genre-label").textContent = genre.name;
      document.getElementById("message").innerHTML = formatMsg(message);
      startCountdown();
    }

    function startCountdown() {
      const end = Date.now() + INTERVAL_MS;
      const timerEl = document.getElementById("timer");
      clearInterval(window._timer);
      window._timer = setInterval(() => {
        const rem = end - Date.now();
        if (rem <= 0) { clearInterval(window._timer); update(); return; }
        const m = Math.floor(rem / 60000);
        const s = Math.floor((rem % 60000) / 1000);
        timerEl.textContent = `${m}:${String(s).padStart(2, "0")}`;
      }, 1000);
    }
  </script>
</body>
</html>
