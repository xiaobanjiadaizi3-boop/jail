<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Jail</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --sub: #aaaaaa;
      --border: #e8e8e8;
      --btn-bg: #1a1a1a;
      --btn-text: #ffffff;
      --timer-fill: #1a1a1a;
      --timer-empty: #efefef;
      --remaining: 1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      font-family: -apple-system, "Helvetica Neue", sans-serif;
      transition: background 0.35s, color 0.35s;
    }

    /* ── screens ── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 52px 32px 48px;
    }
    .screen.active { display: flex; }

    .screen-title {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .screen-sub {
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 32px;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .btn-primary {
      width: 100%;
      max-width: 320px;
      padding: 16px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 14px;
      font-size: 16px;
      letter-spacing: 0.1em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.3s, color 0.3s, opacity 0.2s;
    }
    .btn-primary:disabled { opacity: 0.25; cursor: default; }

    /* ── genre screen ── */
    .genre-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 28px;
    }
    .genre-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .genre-item.selected { border-color: var(--text); }
    .genre-check {
      width: 20px; height: 20px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .genre-item.selected .genre-check {
      border-color: var(--text);
      background: var(--text);
    }
    .genre-item.selected .genre-check::after {
      content: "";
      width: 6px; height: 6px;
      background: var(--bg);
      border-radius: 50%;
    }
    .genre-label { font-size: 15px; letter-spacing: 0.05em; }

    /* ── timer screen ── */
    .timer-picker {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 44px;
    }
    .picker-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .picker-unit {
      font-size: 12px;
      color: var(--sub);
      letter-spacing: 0.1em;
    }
    .picker-val {
      font-size: 64px;
      font-weight: 200;
      min-width: 90px;
      text-align: center;
      letter-spacing: -0.02em;
    }
    .picker-sep {
      font-size: 48px;
      font-weight: 200;
      color: var(--sub);
      padding-bottom: 22px;
    }
    .picker-btn {
      width: 52px; height: 52px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      background: transparent;
      color: var(--text);
      font-size: 26px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    /* ── theme screen ── */
    .theme-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 28px;
    }
    .theme-card {
      border: 2px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .theme-card.selected { border-color: var(--text); }
    .theme-preview {
      height: 80px;
      display: flex; align-items: center; justify-content: center;
    }
    .theme-dot {
      width: 44px; height: 44px;
      border-radius: 50%;
    }
    .theme-name-label {
      padding: 8px 12px 10px;
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    /* ── start screen ── */
    #screen-start { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    #start-hint {
      font-size: 20px;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 2.2;
      opacity: 0.55;
    }
    #start-meta {
      margin-top: 28px;
      font-size: 13px;
      color: var(--sub);
      text-align: center;
      line-height: 2;
      letter-spacing: 0.04em;
    }

    /* ── main detox screen ── */
    #screen-main {
      position: fixed;
      inset: 0;
      min-height: unset;
      padding: 0;
      overflow: hidden;
    }

    #bg-pie {
      position: absolute;
      width: 130vmax;
      height: 130vmax;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: conic-gradient(
        from 0deg,
        var(--timer-fill) 0deg,
        var(--timer-fill) calc(var(--remaining) * 360deg),
        var(--timer-empty) calc(var(--remaining) * 360deg)
      );
    }

    #center-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 64px);
      max-width: 320px;
      text-align: center;
      padding: 0 32px;
      mix-blend-mode: var(--msg-blend);
    }
    #msg-genre {
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--msg-sub);
      margin-bottom: 14px;
    }
    #msg-text {
      font-size: clamp(16px, 4.8vw, 22px);
      font-weight: 400;
      line-height: 2;
      letter-spacing: 0.06em;
      color: var(--msg-color);
    }

    #bottom-timer {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: 200;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- 1: Genre -->
  <div class="screen active" id="screen-genre">
    <div class="screen-title">Jail</div>
    <div class="screen-sub">表示するジャンルを選んでください</div>
    <div class="genre-list" id="genre-list"></div>
    <button class="btn-primary" id="genre-next" disabled>次へ</button>
  </div>

  <!-- 2: Timer -->
  <div class="screen" id="screen-timer">
    <div class="screen-title">タイマー設定</div>
    <div class="screen-sub">デトックスする時間を設定してください<br>（最大 23時間59分）</div>
    <div class="timer-picker">
      <div class="picker-col">
        <button class="picker-btn" id="hr-up">＋</button>
        <div class="picker-val" id="hr-val">0</div>
        <button class="picker-btn" id="hr-dn">－</button>
        <div class="picker-unit">時間</div>
      </div>
      <div class="picker-sep">:</div>
      <div class="picker-col">
        <button class="picker-btn" id="mn-up">＋</button>
        <div class="picker-val" id="mn-val">00</div>
        <button class="picker-btn" id="mn-dn">－</button>
        <div class="picker-unit">分</div>
      </div>
    </div>
    <button class="btn-primary" id="timer-next" disabled>次へ</button>
  </div>

  <!-- 3: Theme -->
  <div class="screen" id="screen-theme">
    <div class="screen-title">テーマ</div>
    <div class="screen-sub">デザインを選んでください</div>
    <div class="theme-grid" id="theme-grid"></div>
    <button class="btn-primary" id="theme-next" disabled>次へ</button>
  </div>

  <!-- 4: Start -->
  <div class="screen" id="screen-start">
    <div id="start-hint">画面をどこかタッチして<br>スタート</div>
    <div id="start-meta"></div>
  </div>

  <!-- 5: Main -->
  <div class="screen" id="screen-main">
    <div id="bg-pie"></div>
    <div id="center-msg">
      <div id="msg-genre"></div>
      <div id="msg-text"></div>
    </div>
    <div id="bottom-timer">0:00:00</div>
  </div>

        "自分が大切にしたい人を一人思い浮かべよう。",
        "笑顔は最も簡単な、最も強いコミュニケーションだ。",
        "誰かのために何かをするとき、自分も幸せになる。",
        "孤独を感じたら、それは誰かとつながりたいサインだ。",
        "今日会った人に、一言だけ優しい言葉をかけよう。",
        "自分を大切にすることが、人を大切にする第一歩だ。",
        "誰かの笑顔を思い浮かべると、自分も少し笑える。",
        "比べるのではなく、認め合うことを選ぼう。",
        "長い付き合いの人に、久しぶりに連絡してみよう。",
        "誰かに頼ることも、勇気のいることだ。",
        "人は一人では生きられない。それは弱さじゃない。",
        "今日誰かの役に立てたことはあったか。",
        "「また会いたい」と思える人が、宝物だ。",
        "自分の心の声を、正直に伝える練習をしよう。",
        "人の良いところを一つ見つける習慣をつくろう。",
        "怒りを感じたら、まず一呼吸置いてから話そう。",
        "感謝の気持ちは言葉にしないと伝わらない。",
        "人との縁は偶然じゃない。大切にしよう。",
        "今日の自分の言葉は、誰かの心に残るかもしれない。",
        "沈黙の中でも、一緒にいられる関係は本物だ。",
        "人の痛みに気づけることが、本当の優しさだ。",
        "誰かのことを心配しているなら、伝えよう。",
        "良い関係は、小さな積み重ねでできている。",
        "自分が変われば、周りとの関係も変わっていく。",
        "無理に仲良くしなくていい。自分に合う人と深くつながろう。",
        "今この瞬間、誰かのことを思えるあなたは優しい。",
        "一人でいる今、大切な人への感謝を静かに感じよう。",
      ]},
      { id: "creative", name: "創造", messages: [
        "何かを書いてみよう。思ったことをそのまま。",
        "紙とペンを出して落書きしよう。",
        "頭の中のアイデアをどこかに記録しよう。",
        "やってみたいことをリストにしよう。",
        "何かを作る喜びを思い出そう。",
        "想像することを楽しもう。",
        "完成させなくていい。始めることに意味がある。",
        "「へたでもいい」と自分に許可を出そう。",
        "音楽を聴くことも、創造のインプットになる。",
        "今日一つ、新しいことを試してみよう。",
        "日常の中に「面白い」を探してみよう。",
        "アイデアは組み合わせから生まれる。今日の経験を繋げてみよう。",
        "制約の中にこそ、創造の力が宿る。",
        "誰かに見せなくていい。自分だけの表現をしよう。",
        "「なぜそうなっているのか」と問うことが創造の始まりだ。",
        "別の方法を考えてみよう。今のやり方だけが答えじゃない。",
        "子供の頃好きだったものを思い出そう。",
        "何かを修理したり、改造したりする楽しさがある。",
        "料理も、言葉も、動きも、全ては創造だ。",
        "失敗作は存在しない。ただの途中だ。",
        "今日感じた「いいな」を言葉にしてみよう。",
        "色、形、音、香り。何かを使って表現してみよう。",
        "アイデアノートを持ち歩くと、世界が変わる。",
        "「もしも〜だったら」という問いから始めよう。",
        "手を動かすと、頭も動き始める。",
        "誰かの作品に感動したら、真似してみよう。そこから始まる。",
        "日記を書くことは、自分の物語を編むことだ。",
        "空白のページは可能性だ。恐れなくていい。",
        "細部にこだわる時間が、作品を本物にする。",
        "今作っているものは、未来の誰かを感動させるかもしれない。",
        "創造に正解はない。自分の感覚を信じよう。",
        "何かを壊して、作り直すことも創造だ。",
        "今日の風景をスケッチしてみよう。見方が変わる。",
        "言葉で表現できないものを、別の形で表してみよう。",
        "作ることは、生きることだ。",
        "小さなものでいい。何か一つ、今日形にしよう。",
      ]},
      { id: "detox", name: "デジタルデトックス", messages: [
        "スマホなしで何ができるか考えよう。",
        "通知は後でいい。今は自分の時間だ。",
        "画面のない時間が本当の休憩だ。",
        "SNSは逃げない。自分の時間を取り戻そう。",
        "情報から離れることも大切な選択だ。",
        "今日のスマホ断ちを続けよう。よくやっている。",
        "スマホを置いた今、何が見えているか。",
        "本物の退屈さの中に、創造の種がある。",
        "画面の外の世界は、想像以上に豊かだ。",
        "今日何回スマホを手に取りそうになったか。気づけるだけで進歩だ。",
        "ネットにない答えを、自分の中に探してみよう。",
        "デジタルの喧騒から離れることで、本当の声が聞こえてくる。",
        "比較の罠から抜け出そう。あなたはあなたでいい。",
        "バッテリー切れを恐れなくなったとき、本当の自由が始まる。",
        "フォロワーの数より、今隣にいる人を大切にしよう。",
        "情報を消費するより、自分が何かを生み出そう。",
        "スマホなしで一時間過ごせたら、それは小さな勝利だ。",
        "「暇だ」と感じる時間が、実は豊かな時間だ。",
        "アプリを開かなくても、世界は続いている。",
        "自分の頭で考える時間を取り戻そう。",
        "リアルな経験は、どんなコンテンツよりも濃い。",
        "今日の自分に「よく頑張った」と言おう。",
        "スマホがなかった頃、何をして楽しんでいたか思い出そう。",
        "デジタルデトックスは罰じゃない。自分へのプレゼントだ。",
        "注意は奪われるものじゃない。自分で選ぶものだ。",
        "画面を見続けることで、見えなくなるものがある。",
        "今この瞬間を記録しなくていい。ただ感じよう。",
        "スクロールをやめると、時間の感覚が戻ってくる。",
        "依存に気づいた瞬間、もう半分は解放されている。",
        "今日デトックスを選んだ自分を誇りに思おう。",
        "本当に大事な情報は、画面の外にある。",
        "静かな時間に慣れていこう。最初は落ち着かなくていい。",
        "スマホ断ちは、自分との約束を守る練習だ。",
        "今ここにある「退屈」を、大切にしよう。",
        "デトックスが終わったとき、世界が少し違って見えるはずだ。",
        "今見ているものは画面じゃない。本物の世界だ。",
      ]},
    ];

    // ── State ──
    const S = { genres: new Set(), hours: 0, minutes: 0, theme: null, total: 0, remaining: 0 };

    // ── Utils ──
    const pick = arr => arr[Math.floor(Math.random() * arr.length)];
    const pad  = n => String(n).padStart(2, '0');
    const fmt  = s => {
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${m}:${pad(sec)}`;
    };
    const fmtMsg = t => t.replace(/([、。])/g, '$1<br>');

    function applyTheme(id) {
      const t = THEMES[id];
      const r = document.documentElement.style;
      r.setProperty('--bg',          t.bg);
      r.setProperty('--text',        t.text);
      r.setProperty('--sub',         t.sub);
      r.setProperty('--border',      t.border);
      r.setProperty('--btn-bg',      t.btnBg);
      r.setProperty('--btn-text',    t.btnText);
      r.setProperty('--timer-fill',  t.timerFill);
      r.setProperty('--timer-empty', t.timerEmpty);
      r.setProperty('--msg-blend',   t.msgBlend);
      r.setProperty('--msg-color',   t.msgColor);
      r.setProperty('--msg-sub',     t.msgSub);
    }

    function go(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── Screen 1: Genre ──
    const genreNext = document.getElementById('genre-next');
    GENRES.forEach(g => {
      const el = document.createElement('div');
      el.className = 'genre-item';
      el.innerHTML = `<div class="genre-check"></div><span class="genre-label">${g.name}</span>`;
      el.addEventListener('click', () => {
        S.genres.has(g.id) ? (S.genres.delete(g.id), el.classList.remove('selected'))
                           : (S.genres.add(g.id),    el.classList.add('selected'));
        genreNext.disabled = S.genres.size === 0;
      });
      document.getElementById('genre-list').appendChild(el);
    });
    genreNext.addEventListener('click', () => go('screen-timer'));

    // ── Screen 2: Timer ──
    const hrVal   = document.getElementById('hr-val');
    const mnVal   = document.getElementById('mn-val');
    const timerNext = document.getElementById('timer-next');

    function syncTimer() {
      hrVal.textContent = S.hours;
      mnVal.textContent = pad(S.minutes);
      timerNext.disabled = S.hours === 0 && S.minutes === 0;
    }

    function repeatable(el, fn) {
      let iv;
      el.addEventListener('pointerdown', () => { fn(); iv = setInterval(fn, 130); });
      ['pointerup','pointerleave','pointercancel'].forEach(e => el.addEventListener(e, () => clearInterval(iv)));
    }

    repeatable(document.getElementById('hr-up'), () => { S.hours = Math.min(23, S.hours + 1); syncTimer(); });
    repeatable(document.getElementById('hr-dn'), () => { S.hours = Math.max(0,  S.hours - 1); syncTimer(); });
    repeatable(document.getElementById('mn-up'), () => {
      if (S.hours === 23 && S.minutes === 59) return;
      S.minutes = (S.minutes + 1) % 60; syncTimer();
    });
    repeatable(document.getElementById('mn-dn'), () => {
      S.minutes = (S.minutes - 1 + 60) % 60; syncTimer();
    });
    timerNext.addEventListener('click', () => go('screen-theme'));

    // ── Screen 3: Theme ──
    const themeNext = document.getElementById('theme-next');
    Object.entries(THEMES).forEach(([id, t]) => {
      const card = document.createElement('div');
      card.className = 'theme-card';
      card.innerHTML = `
        <div class="theme-preview" style="background:${t.prevBg}">
          <div class="theme-dot" style="background:${t.prevDot}"></div>
        </div>
        <div class="theme-name-label" style="background:${t.bg};color:${t.text}">${t.name}</div>`;
      card.addEventListener('click', () => {
        document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        S.theme = id;
        themeNext.disabled = false;
        applyTheme(id);
      });
      document.getElementById('theme-grid').appendChild(card);
    });
    themeNext.addEventListener('click', () => {
      const h = S.hours, m = S.minutes;
      const timeParts = [];
      if (h) timeParts.push(`${h}時間`);
      if (m) timeParts.push(`${m}分`);
      const genreNames = [...S.genres].map(id => GENRES.find(g => g.id === id).name).join('・');
      document.getElementById('start-meta').textContent = `${timeParts.join('')}  ／  ${genreNames}`;
      go('screen-start');
    });

    // ── Screen 4: Start ──
    document.getElementById('screen-start').addEventListener('click', startDetox);

    // ── Screen 5: Main ──
    let _countdown, _msgRotate;
    const MSG_MS = 5 * 60 * 1000;

    function startDetox() {
      S.total = S.hours * 3600 + S.minutes * 60;
      S.remaining = S.total;
      go('screen-main');
      rotateMessage();
      tick();

      clearInterval(_countdown);
      _countdown = setInterval(() => {
        if (S.remaining <= 0) {
          clearInterval(_countdown);
          clearInterval(_msgRotate);
          onComplete();
          return;
        }
        S.remaining--;
        tick();
      }, 1000);

      clearInterval(_msgRotate);
      _msgRotate = setInterval(rotateMessage, MSG_MS);
    }

    function tick() {
      const frac = S.total > 0 ? S.remaining / S.total : 0;
      document.documentElement.style.setProperty('--remaining', frac);
      document.getElementById('bottom-timer').textContent = fmt(S.remaining);
    }

    function rotateMessage() {
      const pool = GENRES.filter(g => S.genres.has(g.id));
      const genre = pick(pool);
      const msg   = pick(genre.messages);
      document.getElementById('msg-genre').textContent = genre.name;
      document.getElementById('msg-text').innerHTML    = fmtMsg(msg);
    }

    function onComplete() {
      document.documentElement.style.setProperty('--remaining', 0);
      document.getElementById('bottom-timer').textContent = '完了';
      document.getElementById('msg-genre').textContent    = '';
      document.getElementById('msg-text').innerHTML       = 'お疲れ様でした。<br>デトックス完了。';
    }
  </script>
</body>
</html>
